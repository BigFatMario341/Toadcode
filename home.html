<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toadcode Home</title>
    <style>
        :root {
            --primary-bg: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #4ade80; /* Neon Toad Green */
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .wrapper {
            max-width: 900px;
            width: 100%;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--accent-color);
            text-transform: lowercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
            font-weight: 500;
        }

        .nav-item {
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item:hover {
            color: var(--accent-color);
        }

        /* Main Content Layout */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        /* Elements */
        h2 {
            margin-top: 0;
            font-size: 22px;
            color: var(--accent-color);
            border-bottom: 2px solid #333;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        .pinball-link {
            display: inline-block;
            background: rgba(74, 222, 128, 0.1);
            color: var(--accent-color);
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .pinball-link:hover {
            background: var(--accent-color);
            color: #000;
        }

        p {
            line-height: 1.6;
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        /* Mobile Optimization */
        @media (max-width: 700px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="logo">toadcode</div>
            <div class="nav-links">
                <span class="nav-item">Home</span>
                <span class="nav-item" style="font-size: 24px;">≡</span>
            </div>
        </header>

        <main class="container">
            <div class="card">
                <h2>Projects</h2>
                <div style="margin-top: 10px;">
                    <a href="https://toadcode.net/pinball.html" class="pinball-link">● Play Pinball</a>
                </div>
            </div>

            <div class="card">
                <h2>About</h2>
                <p>I made a fun website for me to share my fun things with you.</p>
            </div>
        </main>
    </div>

</body>
</html>
